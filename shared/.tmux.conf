# design
set-option -g window-style fg=colour244,bg=colour236
#set-option -g window-active-style 'fg=colour7','bg=colour234'
set-option -g window-active-style fg=colour7,bg=colour0
set-option -g pane-border-style fg=colour244,bg=colour236
set-option -g pane-active-border-style fg=colour196,bg=colour88

# pane status
set-option -g pane-border-status off
#set-option -g pane-border-status top
#set-option -g pane-border-format "#[fg=colour214][#{pane_width}x#{pane_height}]"
#set-option -g pane-border-format "#[fg=colour11] #{pane_current_command} #[fg=colour248][#{pane_width}x#{pane_height}] "

# status line
set -g status-justify left
set -g status-style bg=colour0,fg=colour244
set -g status-interval 2

# window status
setw -g window-status-format "#[fg=colour244,bg=black]▌#[fg=colour244,bg=colour236]#I#[fg=colour236,bg=colour244]▌#[bg=colour244,fg=colour236]#W#[fg=black,bg=colour236]▌"
setw -g window-status-current-format "#[fg=black,bg=colour88]▌#[bg=colour88,fg=colour214]#[bold]#I#[default]#[fg=colour88,bg=colour214]▌#[fg=black,bg=colour214]#W#[fg=colour214,bg=black]▌"
setw -g window-status-separator ""
#setw -g window-status-current-style 'fg=colour11,bg=colour0'

# status bar
set -g status-left-length 16
set -g status-left "#[fg=colour214,bg=colour88]🌐#[fg=colour88,bg=colour214]▏#[fg=black,bg=colour214]#{?#{==:#H,M-JVQ301G4CQ},Bouvet,#H}#[fg=color214,bg=black]▌"
set -g status-right '#[fg=black,bg=colour88]▌#[fg=colour214,bg=colour88]%d.%m.%Y#[fg=colour88,bg=colour214]▌#[fg=colour0,bg=colour214]%H:%M'

# mouse
set -g mouse on

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# reload config file
bind r source-file ~/.tmux.conf

# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# don't rename windows automatically
set-option -g allow-rename off

# bind e to toggle synchronize-panes
bind e run-shell "~/.tmux/toggle_synchronize.sh"

# bind Æ to default session
bind Æ source-file ~/.tmux/session_default.conf
